<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me — Alex Carter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Nav bar -->
    <nav class="navbar">
      <a href="index.html" class="nav-logo">
        <img src="images/alex-logo.png" alt="Alex Carter logo" />
      </a>

      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><span class="nav-sep">/</span></li>
        <li><a href="projects.html" class="nav-link">Projects</a></li>
        <li><span class="nav-sep">/</span></li>
        <li><a href="contact.html" class="nav-link active">Contact Me</a></li>
      </ul>

      <a href="https://linkedin.com" target="_blank" class="nav-linkedin">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
          />
        </svg>
        <span>LinkedIn</span>
      </a>
    </nav>

    <!-- Contact page -->
    <div class="contact-page">
      <div class="contact-content">
        <div class="contact-card fade-in fade-in-1">
          <h1 class="contact-title">Contact Me</h1>

          <!-- Form -->
          <div class="form-group">
            <label class="form-label" for="email">Your email:</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="you@example.com"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="message">Message:</label>
            <textarea
              class="form-textarea"
              id="message"
              placeholder="Write your message here…"
            ></textarea>
          </div>

          <div class="form-submit">
            <button
              class="btn btn-primary"
              id="submit-btn"
              onclick="submitForm()"
            >
              Send Message
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z" />
              </svg>
            </button>
          </div>

          <p class="form-feedback" id="form-feedback"></p>

          <!-- Phone and email info -->
          <div class="contact-info">
            <div class="contact-info-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                <line x1="12" y1="18" x2="12.01" y2="18" />
              </svg>
              <span>+34 *** *** ***</span>
            </div>
            <div class="contact-info-item">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <span>alex.carter@gmail.com</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
